<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>禾速車隊 HeSpeed Premium</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --primary-blue: #1E90FF; --dark-blue: #0a1930; --bg-light: #f4f7f9;
            --success-green: #28a745; --line-green: #06C755; --warning-red: #d9534f;
        }
        body { background-color: var(--bg-light); margin: 0; font-family: "Microsoft JhengHei", sans-serif; }
        .line-banner { background-color: var(--success-green); text-align: center; padding: 12px 0; }
        .line-banner a { color: white; text-decoration: none; font-weight: bold; display: block; }
        header { background-color: var(--primary-blue); color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000;}
        
        .nav-menu { display: flex; justify-content: center; gap: 8px; margin: 15px 0; padding: 0 10px; }
        .nav-btn { flex: 1; padding: 12px; border: 2px solid var(--primary-blue); background: white; color: var(--primary-blue); border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 0.85rem; transition: 0.3s; }
        .nav-btn.active { background: var(--primary-blue); color: white; }
        
        .section-container { display: none; width: 92%; max-width: 800px; margin: 0 auto 30px; padding: 25px; background: white; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.08); box-sizing: border-box; }
        .active { display: block; }
        
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .submit-btn { background: var(--primary-blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* 🔵 新增：四區塊價格參考表樣式 (可從此處調整文字/數字大小) */
        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
        .price-card { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 15px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .price-title { font-size: 0.95rem; font-weight: bold; color: var(--dark-blue); margin-bottom: 5px; }
        .price-amount { font-size: 1.3rem; font-weight: bold; color: var(--warning-red); }

        /* 🔴 新增：紅色備註提醒區塊 */
        .notice-box { font-size: 0.85rem; color: var(--warning-red); background: #fff4f4; padding: 12px; margin: 10px 0; border-left: 4px solid var(--warning-red); border-radius: 4px; line-height: 1.4; }

        label { font-weight: bold; font-size: 0.95rem; color: var(--dark-blue); display: block; margin-top: 10px; }
        .req-star { color: red; display: none; }
        .logged-in-only { display: none; }
    </style>
</head>
<body>

<div class="line-banner">
    <a href="https://line.me/R/ti/p/@372fxlit" target="_blank">官方 LINE 帳號：@372fxlit (點擊自動登入)</a>
</div>

<header>
    <h1 style="margin:0; font-size: 1.2rem;">禾速車隊 HeSpeed</h1>
    <div id="user-display">訪客您好</div>
</header>

<div class="nav-menu">
    <button class="nav-btn active" onclick="switchTab('home', this)">首頁</button>
    <button class="nav-btn guest-only" onclick="switchTab('login', this)">登入/註冊</button>
    <button class="nav-btn logged-in-only" onclick="switchTab('booking', this)">預約派車</button>
</div>

<div id="home" class="section-container active">
    <h3 style="margin-top:0;">專業接送服務</h3>
    <button class="submit-btn" onclick="openBooking('機場接機')">預約 接機</button>
    <button class="submit-btn" style="background:#555;" onclick="openBooking('機場送機')">預約 送機</button>
    <button class="submit-btn" style="background:#888;" onclick="openBooking('定點接送')">預約 定點</button>

    <div class="price-grid">
        <div class="price-card">
            <div class="price-title">台北松山機場</div>
            <div class="price-amount">$1,000 起</div>
        </div>
        <div class="price-card">
            <div class="price-title">桃園國際機場</div>
            <div class="price-amount">$1,200 起</div>
        </div>
        <div class="price-card">
            <div class="price-title">台中清泉崗機場</div>
            <div class="price-amount">$2,500 起</div>
        </div>
        <div class="price-card">
            <div class="price-title">高雄小港機場</div>
            <div class="price-amount">$3,500 起</div>
        </div>
    </div>
</div>

<div id="login" class="section-container">
    <h3 style="margin-top:0;">會員登入 / 註冊</h3>
    <button class="submit-btn" style="background:var(--line-green);" onclick="liffLogin()">🟢 LINE 一鍵登入</button>
    
    <div style="text-align:center; margin:20px 0; color:#888; font-size:0.9rem;">─ 或使用手機號碼 ─</div>
    
    <label>手機號碼</label>
    <input type="tel" id="login-phone" placeholder="請輸入手機號碼 (必填)">
    <label>登入密碼</label>
    <input type="password" id="login-pwd" placeholder="請輸入密碼 (必填)">
    <label>您的稱謂 <span style="color:#888; font-weight:normal; font-size:0.8rem;">(初次註冊建議填寫)</span></label>
    <input type="text" id="login-name" placeholder="例如：王先生 / 李小姐 (選填)">
    
    <button class="submit-btn" id="manual-login-btn" onclick="handleManualLogin()">確認 登入 / 註冊</button>
    <p style="font-size: 0.8rem; color: #666; text-align: center; margin-top: 15px;">
        *若您的帳號不存在，系統將自動為您完成註冊並登入。
    </p>
</div>

<div id="booking" class="section-container">
    <h3 id="booking-title" style="margin-top:0;">預約派車</h3>
    <input type="hidden" id="order-type">
    
    <label>預約日期與時間</label>
    <div style="display:flex; gap:10px;">
        <input type="date" id="order-date" style="flex:1;">
        <input type="time" id="order-time" style="flex:1;">
    </div>
    
    <label>起點與終點</label>
    <input type="text" id="pickup" placeholder="起點 (例如：桃園機場第一航廈)">
    <input type="text" id="dropoff" placeholder="終點 (例如：台北市信義區...)">
    
    <label>航班編號 <span id="flight-req-star" class="req-star">* (接送機必填)</span></label>
    <input type="text" id="flight-num" placeholder="請填寫航班編號">
    
    <div style="display:flex; gap:10px;">
        <div style="flex:1;">
            <label>搭乘人數</label>
            <input type="number" id="pax" placeholder="人數" min="1" max="9" oninput="checkCarType()">
        </div>
        <div style="flex:1;">
            <label>行李數量</label>
            <input type="number" id="luggage" placeholder="行李件數" min="0">
        </div>
    </div>

    <div class="notice-box">
        行李箱、登機箱、輪椅、手提行李各計算一件。<br>若上車現場與登錄尺寸數量有誤，將另行計算現場報價。
    </div>

    <label>車型需求</label>
    <select id="car-type" onchange="checkCarType()">
        <option value="豪華轎車 (4人座)">豪華轎車 (4人座)</option>
        <option value="豪華7~9人座車">豪華7~9人座車</option>
    </select>

    <div class="notice-box">
        行李箱請標示種類、尺寸、數量。<br>若上車現場與登錄尺寸數量有誤，將另行計算現場報價。
    </div>

    <label>備註需求</label>
    <textarea id="note" rows="3" placeholder="請填寫您的特殊需求或行李詳細清單..."></textarea>
    
    <button class="submit-btn" id="submit-order-btn" onclick="processOrder()">確認提交訂單</button>
</div>

<script>
    // 🔴 必填設定區
    const API_URL = "https://script.google.com/macros/s/AKfycbzSWkdAGw5wJEOmkSy2EL2T6j8b761IP59yjE_TduZZ1rkE7Uv3qqA9qJ3ajc13FNLN/exec"; 
    const LIFF_ID = "2009890777-cM1Qxrxz"; 
    let currentAccount = "";
    let currentName = "";

    // 🟢 初始化 LIFF
    async function initLiff() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                // 為了簡化，LINE 登入直接取其暱稱，並標記為 LINE 帳號
                loginSuccess(profile.displayName, "LINE_" + profile.userId.substring(0,8));
            }
        } catch (e) { console.error("LIFF 載入失敗"); }
    }

    function liffLogin() { if (!liff.isLoggedIn()) liff.login(); }

    // 🟢 手動登入與自動註冊邏輯
    async function handleManualLogin() {
        const ph = document.getElementById('login-phone').value.trim();
        const pwd = document.getElementById('login-pwd').value.trim();
        const name = document.getElementById('login-name').value.trim();

        if (ph.length < 10 || !pwd) return alert("請輸入完整的手機號碼與密碼！");

        const btn = document.getElementById('manual-login-btn');
        btn.innerText = "驗證中..."; btn.disabled = true;

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "loginOrRegister", data: { account: ph, password: pwd, name: name } })
            });
            const result = await res.json();

            if (result.status === "Success" || result.status === "Registered") {
                loginSuccess(result.user.name, result.user.account);
                if (result.status === "Registered") alert("註冊成功！已為您自動登入。");
            } else if (result.status === "WrongPassword") {
                alert("密碼錯誤，請重新確認！");
            }
        } catch (e) {
            alert("系統連線異常，請稍後再試。");
        } finally {
            btn.innerText = "確認 登入 / 註冊"; btn.disabled = false;
        }
    }

    // 🟢 登入成功處理 (動態顯示稱謂)
    function loginSuccess(name, acc) {
        currentAccount = acc;
        currentName = name;
        const displayName = name ? name : "尊榮會員"; // 若無稱謂，顯示尊榮會員
        
        document.getElementById('user-display').innerText = displayName + "：" + acc;
        
        document.querySelectorAll('.guest-only').forEach(e => e.style.display = 'none');
        document.querySelectorAll('.logged-in-only').forEach(e => e.style.display = 'block');
        switchTab('home', document.querySelector('.nav-btn'));
    }

    // 🟢 切換至預約表單並判斷必填星號
    function openBooking(type) {
        if(!currentAccount) {
            alert("請先完成會員登入或註冊！");
            return switchTab('login', document.querySelectorAll('.nav-btn')[1]);
        }
        document.getElementById('order-type').value = type;
        document.getElementById('booking-title').innerText = "預約 - " + type;
        
        // 判斷接送機，顯示航班必填星號
        if(type === '機場接機' || type === '機場送機') {
            document.getElementById('flight-req-star').style.display = 'inline';
        } else {
            document.getElementById('flight-req-star').style.display = 'none';
        }

        switchTab('booking', null);
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.section-container').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    }

    // 🟢 防呆機制：人數超過 4 人自動跳選 7-9人座
    function checkCarType() {
        const pax = parseInt(document.getElementById('pax').value) || 0;
        const carSelect = document.getElementById('car-type');
        if (pax > 4) {
            carSelect.value = "豪華7~9人座車";
        }
    }

    // 🟢 提交訂單與最終驗證
    async function processOrder() {
        const type = document.getElementById('order-type').value;
        const flightNum = document.getElementById('flight-num').value.trim();
        const pax = parseInt(document.getElementById('pax').value) || 0;
        const carType = document.getElementById('car-type').value;
        const date = document.getElementById('order-date').value;
        const time = document.getElementById('order-time').value;

        // 1. 必填驗證
        if (!date || !time) return alert("請填寫預約日期與時間！");
        if ((type === '機場接機' || type === '機場送機') && !flightNum) {
            return alert("『" + type + "』必須填寫航班編號！");
        }

        // 2. 人數車型防呆
        if (pax > 4 && carType !== '豪華7~9人座車') {
            document.getElementById('car-type').value = '豪華7~9人座車';
            return alert("搭乘人數超過 4 人，已自動為您更換為『豪華7~9人座車』，請確認後再次點擊提交。");
        }

        const btn = document.getElementById('submit-order-btn');
        btn.innerText = "訂單傳送中..."; btn.disabled = true;

        const orderData = {
            type: type, account: currentAccount, date: date, time: time,
            pickup: document.getElementById('pickup').value,
            dropoff: document.getElementById('dropoff').value,
            flightNum: flightNum, pax: pax,
            luggage: document.getElementById('luggage').value || 0,
            carType: carType, note: document.getElementById('note').value
        };

        try {
            await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "submitOrder", data: orderData })
            });
            alert("預約成功！客服人員將會盡快與您聯繫確認。");
            switchTab('home', document.querySelector('.nav-btn'));
        } catch (e) {
            alert("訂單發送異常，請稍後再試。");
        } finally {
            btn.innerText = "確認提交訂單"; btn.disabled = false;
        }
    }

    window.onload = initLiff;
</script>
</body>
</html>
