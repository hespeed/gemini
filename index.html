<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>禾速車隊 HeSpeed Premium</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --primary-blue: #1E90FF; --dark-blue: #0a1930; --bg-light: #f4f7f9;
            --white: #ffffff; --success-green: #28a745; --line-green: #06C755;
        }
        body { background-color: var(--bg-light); margin: 0; font-family: "Microsoft JhengHei", sans-serif; }
        
        .line-banner { background-color: var(--success-green); text-align: center; padding: 12px 0; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .line-banner a { color: white; text-decoration: none; font-weight: bold; display: block; width: 100%; }

        header { background-color: var(--primary-blue); color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        
        .nav-menu { display: flex; justify-content: center; gap: 8px; margin: 15px 0; padding: 0 10px; }
        .nav-btn { flex: 1; padding: 12px; border: 2px solid var(--primary-blue); background: white; color: var(--primary-blue); border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
        .nav-btn.active { background: var(--primary-blue); color: white; }
        
        .section-container { display: none; width: 92%; max-width: 800px; margin: 0 auto 30px; padding: 25px; background: white; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.08); box-sizing: border-box; }
        .active { display: block; }

        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .submit-btn { background: var(--primary-blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .line-login-btn { background-color: var(--line-green); }
        .logged-in-only { display: none; }
        label { font-weight: bold; font-size: 0.9rem; color: var(--dark-blue); }
    </style>
</head>
<body>

<div class="line-banner">
    <a href="https://line.me/R/ti/p/@372fxlit" target="_blank">官方 LINE 帳號：@372fxlit (點擊自動登入)</a>
</div>

<header>
    <h1 style="margin:0; font-size: 1.2rem;">禾速車隊 HeSpeed</h1>
    <div id="user-display">訪客您好</div>
</header>

<div class="nav-menu">
    <button class="nav-btn active" onclick="switchTab('home', this)">首頁</button>
    <button class="nav-btn guest-only" onclick="switchTab('login', this)">登入</button>
    <button class="nav-btn logged-in-only" onclick="switchTab('member-area', this)">會員中心</button>
</div>

<div id="home" class="section-container active">
    <h3>優質接送服務</h3>
    <button class="submit-btn" onclick="openBooking('機場接機')">立即預約接機</button>
    <button class="submit-btn" style="background:#666;" onclick="openBooking('機場送機')">立即預約送機</button>
</div>

<div id="login" class="section-container">
    <h3>會員登入</h3>
    <button class="submit-btn line-login-btn" onclick="liffTriggerLogin()">🟢 使用 LINE 自動登入</button>
    <div style="text-align:center; margin:15px 0; color:#888;">─ 或手機號碼登入 ─</div>
    <input type="tel" id="login-phone" placeholder="手機號碼">
    <input type="password" id="login-pwd" placeholder="密碼">
    <button class="submit-btn" onclick="handleManualLogin()">登入</button>
</div>

<div id="booking-section" class="section-container">
    <h3 id="booking-title">預約派車</h3>
    <form id="orderForm">
        <input type="hidden" id="order-type">
        <label>預約日期</label><input type="date" id="order-date" required>
        <label>預約時間</label><input type="time" id="order-time" required>
        <input type="text" id="pickup" placeholder="起點 (例如：桃園機場第一航廈)">
        <input type="text" id="dropoff" placeholder="終點 (例如：台北市信義區...)">
        <input type="text" id="flight-num" placeholder="航班編號 (選填)">
        <select id="car-type">
            <option>豪華轎車 (4人座)</option>
            <option>豪華商務車 (7-9人座)</option>
        </select>
        <textarea id="note" placeholder="備註 (人數、行李數量或特殊需求)"></textarea>
        <button type="button" class="submit-btn" onclick="processOrder()">確認提交預約</button>
    </form>
</div>

<script>
    // 🔴 請務必填寫您的 GAS 與 LIFF ID
    const API_URL = "https://script.google.com/macros/s/AKfycbwo-qWVO5t9ou0YWfCjvSAHigAtsgxliYrxIITlPg2KnPajv9hYMEYc8gZOcXYeuL6p/exec"; 
    const LIFF_ID = "2009890777-cM1Qxrxz"; 

    let currentAccount = "";

    // 🟢 初始化 LIFF
    async function initLiff() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                performLineVerify(profile.userId, profile.displayName);
            }
        } catch (e) { console.error("LIFF 初始化失敗"); }
    }

    function liffTriggerLogin() {
        if (!liff.isLoggedIn()) liff.login();
    }

    function performLineVerify(lineId, name) {
        document.getElementById('user-display').innerText = "會員：" + name;
        currentAccount = "LINE_MEMBER"; // 這裡可進階串接後端驗證
        updateUI(true);
    }

    function updateUI(isLoggedIn) {
        document.querySelectorAll('.guest-only').forEach(e => e.style.display = isLoggedIn ? 'none' : 'block');
        document.querySelectorAll('.logged-in-only').forEach(e => e.style.display = isLoggedIn ? 'block' : 'none');
    }

    // 🟢 修正：補齊 openBooking 函式
    function openBooking(type) {
        if(!currentAccount) {
            alert("請先登入會員");
            return switchTab('login', document.querySelectorAll('.nav-btn')[1]);
        }
        document.getElementById('order-type').value = type;
        document.getElementById('booking-title').innerText = "預約 - " + type;
        switchTab('booking-section', null);
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.section-container').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    }

    async function processOrder() {
        const data = {
            type: document.getElementById('order-type').value,
            account: currentAccount,
            date: document.getElementById('order-date').value,
            time: document.getElementById('order-time').value,
            pickup: document.getElementById('pickup').value,
            dropoff: document.getElementById('dropoff').value,
            carType: document.getElementById('car-type').value,
            note: document.getElementById('note').value
        };
        
        alert("預約已提交！(請串接後端 API)");
        switchTab('home', document.querySelector('.nav-btn'));
    }

    window.onload = initLiff;
</script>
</body>
</html>
