<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>禾速車隊 HeSpeed Premium</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --primary-blue: #1E90FF; --dark-blue: #0a1930; --bg-light: #f4f7f9;
            --success-green: #28a745; --line-green: #06C755;
        }
        body { background-color: var(--bg-light); margin: 0; font-family: "Microsoft JhengHei", sans-serif; }
        .line-banner { background-color: var(--success-green); text-align: center; padding: 12px 0; }
        .line-banner a { color: white; text-decoration: none; font-weight: bold; display: block; }
        header { background-color: var(--primary-blue); color: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; }
        .nav-menu { display: flex; justify-content: center; gap: 8px; margin: 15px 0; padding: 0 10px; }
        .nav-btn { flex: 1; padding: 12px; border: 2px solid var(--primary-blue); background: white; color: var(--primary-blue); border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
        .nav-btn.active { background: var(--primary-blue); color: white; }
        .section-container { display: none; width: 92%; max-width: 800px; margin: 0 auto 30px; padding: 25px; background: white; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.08); box-sizing: border-box; }
        .active { display: block; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .submit-btn { background: var(--primary-blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="line-banner">
    <a href="https://line.me/R/ti/p/@372fxlit" target="_blank">官方 LINE 帳號：@372fxlit (點擊自動登入)</a>
</div>

<header>
    <h1 style="margin:0; font-size: 1.2rem;">禾速車隊 HeSpeed</h1>
    <div id="user-display">訪客您好</div>
</header>

<div class="nav-menu">
    <button class="nav-btn active" onclick="switchTab('home', this)">首頁</button>
    <button class="nav-btn guest-only" onclick="switchTab('login', this)">登入</button>
    <button class="nav-btn logged-in-only" onclick="switchTab('booking', this)">預約派車</button>
</div>

<div id="home" class="section-container active">
    <h3>專業接送服務</h3>
    <button class="submit-btn" onclick="openBooking('機場接機')">立即預約接機</button>
    <button class="submit-btn" style="background:#666; margin-top:10px;" onclick="openBooking('機場送機')">立即預約送機</button>
</div>

<div id="login" class="section-container">
    <h3>會員登入</h3>
    <button class="submit-btn" style="background:var(--line-green);" onclick="liffLogin()">🟢 LINE 一鍵登入</button>
    <div style="text-align:center; margin:15px 0; color:#888;">或使用手機登入</div>
    <input type="tel" id="login-phone" placeholder="手機號碼">
    <input type="password" id="login-pwd" placeholder="密碼">
    <button class="submit-btn" onclick="handleManualLogin()">登入</button>
</div>

<div id="booking" class="section-container">
    <h3 id="booking-title">預約表單</h3>
    <input type="hidden" id="order-type">
    <input type="date" id="order-date">
    <input type="time" id="order-time">
    <input type="text" id="pickup" placeholder="起點">
    <input type="text" id="dropoff" placeholder="終點">
    <select id="car-type">
        <option>豪華轎車 (4人座)</option>
        <option>豪華商務車 (7-9人座)</option>
    </select>
    <button class="submit-btn" onclick="processOrder()">確認提交</button>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwlgcngo9zq4TNcJDxag8y3DPSz2SudurEuEwj3joVTnxs1iw-hTiUQKEUtvYk5mw/exec"; 
    const LIFF_ID = "2009890777-cM1Qxrxz"; 
    let currentAccount = "";

    async function initLiff() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                loginSuccess(profile.displayName, "LINE_USER");
            }
        } catch (e) { console.error("LIFF 載入失敗"); }
    }

    function liffLogin() { if (!liff.isLoggedIn()) liff.login(); }

    function loginSuccess(name, acc) {
        currentAccount = acc;
        document.getElementById('user-display').innerText = "會員：" + name;
        document.querySelectorAll('.guest-only').forEach(e => e.style.display = 'none');
        document.querySelectorAll('.logged-in-only').forEach(e => e.style.display = 'block');
        switchTab('home', document.querySelector('.nav-btn'));
    }

    function openBooking(type) {
        if(!currentAccount) {
            alert("請先登入會員");
            return switchTab('login', document.querySelectorAll('.nav-btn')[1]);
        }
        document.getElementById('order-type').value = type;
        document.getElementById('booking-title').innerText = "預約 - " + type;
        switchTab('booking', null);
    }

    function switchTab(id, btn) {
        document.querySelectorAll('.section-container').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(btn) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    }

    async function processOrder() {
        alert("訂單已發送！");
        switchTab('home', document.querySelector('.nav-btn'));
    }

    window.onload = initLiff;
</script>
</body>
</html>
